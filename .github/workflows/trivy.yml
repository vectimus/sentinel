name: Trivy

on:
  push:
    branches: [main]
    paths:
      - "pipeline/requirements.txt"
      - "cloudflare/package.json"
  pull_request:
    branches: [main]
    paths:
      - "pipeline/requirements.txt"
      - "cloudflare/package.json"
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (pip)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pipeline/requirements.txt
          format: sarif
          output: trivy-pip.sarif
          severity: HIGH,CRITICAL

      - name: Run Trivy (repo filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo.sarif
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig

      - name: Upload pip results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-pip.sarif
          category: trivy-pip

      - name: Upload repo results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-repo.sarif
          category: trivy-repo
