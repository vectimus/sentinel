name: Re-evaluate coverage on policy merge

on:
  repository_dispatch:
    types: [policies-updated]

permissions:
  contents: read

jobs:
  reevaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6

      - name: Validate tag format
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: '$TAG'. Expected semver like v1.2.3"
            exit 1
          fi

      - name: Checkout policies
        uses: actions/checkout@v6
        with:
          repository: vectimus/policies
          ref: ${{ github.event.client_payload.tag }}
          path: policies-checkout

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install cedarpy

      - name: Re-evaluate coverage
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          python -m pipeline.coverage_reevaluate --policies-dir policies-checkout
