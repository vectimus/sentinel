name: Vectimus Sentinel

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  # -----------------------------------------------------------------------
  # Pre-flight: secrets scan + unit tests
  # -----------------------------------------------------------------------
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Gitleaks
        run: gitleaks detect --source . --verbose

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install pytest pytest-asyncio pytest-mock respx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Stage 1: Threat Hunter discovers and classifies incidents
  # Outputs findings JSON as an artifact + human-readable job summary
  # -----------------------------------------------------------------------
  threat-hunter:
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      review_issue: ${{ steps.create-review-issue.outputs.issue_number }}

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run Threat Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: python -m pipeline threat-hunter

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: findings
          path: findings/
          retention-days: 90
          if-no-files-found: warn

      - name: Create review issue
        id: create-review-issue
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: python pipeline/hitl_issue.py create

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: traces-threat-hunter-${{ github.run_id }}
          path: traces/
          retention-days: 90
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # HITL gate: human reviews findings before proceeding.
  # Uses the "sentinel-review" environment (required reviewer: joseph-holland)
  # -----------------------------------------------------------------------
  review-gate:
    needs: threat-hunter
    runs-on: ubuntu-latest
    environment: sentinel-review
    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download findings
        uses: actions/download-artifact@v7
        with:
          name: findings
          path: findings/

      - name: Filter approved findings
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          REVIEW_ISSUE: ${{ needs.threat-hunter.outputs.review_issue }}
        run: python pipeline/hitl_issue.py filter

      - name: Upload approved findings
        uses: actions/upload-artifact@v7
        with:
          name: approved-findings
          path: approved-findings/

  # -----------------------------------------------------------------------
  # Stage 2: Policy Engineer drafts Cedar policies and opens PRs
  # -----------------------------------------------------------------------
  policy-engineer:
    needs: review-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6

      - name: Checkout policies repo
        uses: actions/checkout@v6
        with:
          repository: vectimus/policies
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: _policies

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Vectimus
        run: pip install vectimus

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Download approved findings
        uses: actions/download-artifact@v7
        with:
          name: approved-findings
          path: findings/

      - name: Run Policy Engineer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          POLICIES_REPO_PATH: ${{ github.workspace }}/_policies
        run: python -m pipeline policy-engineer

      - name: Upload stage output
        uses: actions/upload-artifact@v7
        with:
          name: stage-output-policy-engineer
          path: stage-outputs/
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: traces-policy-engineer-${{ github.run_id }}
          path: traces/
          retention-days: 90
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Stage 3: Threat Analyst writes advisory content and opens PRs
  # -----------------------------------------------------------------------
  threat-analyst:
    needs: review-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Download approved findings
        uses: actions/download-artifact@v7
        with:
          name: approved-findings
          path: findings/

      - name: Run Threat Analyst
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: python -m pipeline threat-analyst

      - name: Upload stage output
        uses: actions/upload-artifact@v7
        with:
          name: stage-output-threat-analyst
          path: stage-outputs/
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: traces-threat-analyst-${{ github.run_id }}
          path: traces/
          retention-days: 90
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Stage 4: Compute trends, send digest, commit findings
  # -----------------------------------------------------------------------
  publish:
    needs: [policy-engineer, threat-analyst]
    if: always() && needs.policy-engineer.result != 'cancelled' && needs.threat-analyst.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Download findings
        uses: actions/download-artifact@v7
        with:
          name: findings
          path: findings/

      - name: Download policy engineer output
        uses: actions/download-artifact@v7
        with:
          name: stage-output-policy-engineer
          path: stage-outputs/
        continue-on-error: true

      - name: Download threat analyst output
        uses: actions/download-artifact@v7
        with:
          name: stage-output-threat-analyst
          path: stage-outputs/
        continue-on-error: true

      - name: Run publish
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: python -m pipeline publish

      - name: Commit findings
        run: |
          git config user.name "vectimus-sentinel"
          git config user.email "sentinel@vectimus.com"
          git add findings/
          git diff --staged --quiet || git commit -m "chore: findings $(date -u +%Y-%m-%d)"
          git push
