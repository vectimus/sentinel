name: Vectimus Sentinel

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v4

      - name: Checkout policies repo
        uses: actions/checkout@v4
        with:
          repository: vectimus/policies
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: _policies

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust and Cedar CLI
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          cargo install cedar-policy-cli

      - name: Install Vectimus
        run: pip install vectimus

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run Sentinel pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          POLICIES_REPO_PATH: ${{ github.workspace }}/_policies
        run: python -m pipeline.orchestrator

      - name: Commit findings
        run: |
          git config user.name "vectimus-sentinel"
          git config user.email "sentinel@vectimus.com"
          git add findings/
          git diff --staged --quiet || git commit -m "chore: findings $(date -u +%Y-%m-%d)"
          git push
