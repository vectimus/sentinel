name: Vectimus Sentinel

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install pytest pytest-asyncio pytest-mock respx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  sentinel:
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sentinel
        uses: actions/checkout@v4

      - name: Checkout policies repo
        uses: actions/checkout@v4
        with:
          repository: vectimus/policies
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: _policies

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Vectimus
        run: pip install vectimus

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run Sentinel pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          POLICIES_REPO_PATH: ${{ github.workspace }}/_policies
        run: python -m pipeline

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-traces-${{ github.run_id }}
          path: traces/
          retention-days: 90
          if-no-files-found: ignore

      - name: Commit findings
        run: |
          git config user.name "vectimus-sentinel"
          git config user.email "sentinel@vectimus.com"
          git add findings/
          git diff --staged --quiet || git commit -m "chore: findings $(date -u +%Y-%m-%d)"
          git push
