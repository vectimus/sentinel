name: Snyk Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run Snyk Code
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=medium

  snyk-deps:
    name: Snyk Open Source (SCA)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install . 2>/dev/null || true
      - name: Run Snyk SCA
        run: snyk test --severity-threshold=high --package-manager=pip --command=python3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
