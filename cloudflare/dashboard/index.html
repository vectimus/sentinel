<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vectimus Sentinel — Agentic AI Threat Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0f1a;
      --bg-card: #111827;
      --bg-card-hover: #1a2332;
      --border: #1f2937;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.15);
      --critical: #ef4444;
      --high: #f97316;
      --medium: #eab308;
      --low: #22c55e;
      --theoretical: #6b7280;
      --covered: #22c55e;
      --partial: #eab308;
      --gap: #ef4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-card .delta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .incident-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .incident {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: background 0.15s;
      cursor: pointer;
    }

    .incident:hover {
      background: var(--bg-card-hover);
    }

    .severity-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .severity-5 { background: var(--critical); color: white; }
    .severity-4 { background: var(--high); color: white; }
    .severity-3 { background: var(--medium); color: #1a1a1a; }
    .severity-2 { background: var(--low); color: #1a1a1a; }
    .severity-1 { background: var(--theoretical); color: white; }

    .coverage-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .coverage-covered { background: rgba(34, 197, 94, 0.15); color: var(--covered); }
    .coverage-partial { background: rgba(234, 179, 8, 0.15); color: var(--partial); }
    .coverage-gap { background: rgba(239, 68, 68, 0.15); color: var(--gap); }

    .incident .vtms-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .incident .title {
      flex: 1;
      font-size: 0.9rem;
    }

    .incident .date {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .coverage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .coverage-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .coverage-card .category {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .coverage-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
    }

    .coverage-bar .covered { background: var(--covered); }
    .coverage-bar .partial { background: var(--partial); }
    .coverage-bar .gap-fill { background: var(--gap); }

    .coverage-stats {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .error {
      text-align: center;
      padding: 2rem;
      color: var(--critical);
      background: rgba(239, 68, 68, 0.1);
      border-radius: 8px;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Vectimus <span>Sentinel</span></div>
      <div style="font-size: 0.85rem; color: var(--text-muted);">Agentic AI Threat Intelligence</div>
    </header>

    <div id="stats" class="stats-row">
      <div class="stat-card">
        <div class="label">Total Incidents</div>
        <div class="value" id="total-incidents">—</div>
        <div class="delta" id="delta-30d"></div>
      </div>
      <div class="stat-card">
        <div class="label">Last 30 Days</div>
        <div class="value" id="incidents-30d">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Coverage Rate</div>
        <div class="value" id="coverage-rate">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Policies</div>
        <div class="value" id="policies-total">—</div>
      </div>
    </div>

    <h2>Recent Incidents</h2>
    <div id="incident-list" class="incident-list">
      <div class="loading">Loading incidents...</div>
    </div>

    <h2>Coverage by OWASP Category</h2>
    <div id="coverage-grid" class="coverage-grid">
      <div class="loading">Loading coverage data...</div>
    </div>

    <footer>
      <p>Powered by <a href="https://vectimus.com">Vectimus</a> — Cedar-based governance for AI agents</p>
      <p style="margin-top: 0.5rem;">
        <a href="/api/feed.json">JSON Feed</a> ·
        <a href="https://github.com/vectimus/sentinel">GitHub</a>
      </p>
    </footer>
  </div>

  <script>
    const API_BASE = '/api';
    const SEVERITY_LABELS = { 5: 'Critical', 4: 'High', 3: 'Medium', 2: 'Low', 1: 'Theoretical' };

    async function fetchJSON(path) {
      const res = await fetch(`${API_BASE}${path}`);
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    async function loadStats() {
      try {
        const data = await fetchJSON('/trends');
        const c = data.current;
        if (c) {
          document.getElementById('total-incidents').textContent = c.total_incidents ?? '0';
          document.getElementById('incidents-30d').textContent = c.incidents_30d ?? '0';
          document.getElementById('coverage-rate').textContent =
            c.coverage_rate != null ? `${Math.round(c.coverage_rate * 100)}%` : '—';
          document.getElementById('policies-total').textContent = c.policies_total ?? '0';
        }
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    async function loadIncidents() {
      const container = document.getElementById('incident-list');
      try {
        const data = await fetchJSON('/incidents?limit=20');
        if (!data.incidents || data.incidents.length === 0) {
          container.innerHTML = '<div class="loading">No incidents recorded yet.  Pipeline runs daily at 07:00 UTC.</div>';
          return;
        }
        container.innerHTML = data.incidents.map(inc => `
          <div class="incident">
            <span class="severity-badge severity-${inc.severity}">${SEVERITY_LABELS[inc.severity] || inc.severity}</span>
            <span class="vtms-id">${inc.vtms_id}</span>
            <span class="title">${escapeHtml(inc.title)}</span>
            <span class="coverage-badge coverage-${inc.coverage_status}">${inc.coverage_status}</span>
            <span class="date">${inc.discovered_at ? inc.discovered_at.split('T')[0] : ''}</span>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = `<div class="error">Failed to load incidents: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function loadCoverage() {
      const container = document.getElementById('coverage-grid');
      try {
        const data = await fetchJSON('/coverage');
        if (!data.categories || data.categories.length === 0) {
          container.innerHTML = '<div class="loading">No coverage data yet.</div>';
          return;
        }
        container.innerHTML = data.categories.map(cat => {
          const total = cat.total || 1;
          const covPct = ((cat.covered || 0) / total * 100).toFixed(0);
          const partPct = ((cat.partial || 0) / total * 100).toFixed(0);
          const gapPct = ((cat.gaps || 0) / total * 100).toFixed(0);
          return `
            <div class="coverage-card">
              <div class="category">${escapeHtml(cat.owasp_category || 'Uncategorised')}</div>
              <div class="coverage-bar">
                <div class="covered" style="width: ${covPct}%"></div>
                <div class="partial" style="width: ${partPct}%"></div>
                <div class="gap-fill" style="width: ${gapPct}%"></div>
              </div>
              <div class="coverage-stats">
                <span>${cat.covered || 0} covered</span>
                <span>${cat.partial || 0} partial</span>
                <span>${cat.gaps || 0} gaps</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = `<div class="error">Failed to load coverage: ${escapeHtml(e.message)}</div>`;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Load all data
    loadStats();
    loadIncidents();
    loadCoverage();
  </script>
</body>
</html>
